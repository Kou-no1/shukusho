<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>画像一括縮小ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0d; --surface: #1a1a17; --surface2: #242420;
  --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.15);
  --text: #f0ede6; --text-muted: #8a8780; --text-dim: #4a4844;
  --accent: #c8b97a; --accent-dim: rgba(200,185,122,0.12);
  --success: #70c89a;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: sans-serif; font-size: 13px; overflow: hidden; }

header {
  display: flex; align-items: center; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--bg);
}
header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.05em; }

.app-body { display: flex; height: calc(100vh - 45px); }

#file-panel { width: 220px; border-right: 1px solid var(--border); display: flex; flex-direction: column; background: var(--surface); }
#file-list { flex: 1; overflow-y: auto; padding: 10px; }
.file-item {
  display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer;
  margin-bottom: 4px; border: 1px solid transparent; transition: 0.2s;
}
.file-item:hover { background: var(--surface2); }
.file-item.active { background: var(--accent-dim); border-color: var(--accent); }
.file-thumb { width: 40px; height: 40px; object-fit: cover; border-radius: 3px; background: #000; flex-shrink: 0; }
.file-info { min-width: 0; flex: 1; }
.file-name { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.file-meta { font-size: 9px; color: var(--text-dim); }

#main-area { flex: 1; background: #080807; display: flex; align-items: center; justify-content: center; position: relative; padding: 20px; }
#preview-img { max-width: 100%; max-height: 100%; box-shadow: 0 0 40px rgba(0,0,0,0.5); display: none; }
#empty-msg { color: var(--text-dim); text-align: center; }

#sidebar { width: 250px; border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 24px; overflow-y: auto; }
.section-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 5px; }

.ctrl-group { background: var(--surface2); padding: 15px; border-radius: 8px; }
.val-row { display: flex; justify-content: space-between; margin-bottom: 10px; }
.val-label { font-size: 11px; color: var(--text-muted); }
.val-num { color: var(--accent); font-weight: bold; }
input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }

.res-box { font-family: monospace; font-size: 11px; color: var(--text-dim); margin-top: 10px; line-height: 1.5; }
.res-box span { color: var(--success); }

.btn { width: 100%; padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; transition: 0.2s; }
.btn-primary { background: var(--accent); color: #000; }
.btn-primary:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-outline { background: transparent; color: var(--text-muted); border: 1px solid var(--border2); }

#file-input { display: none; }
</style>
</head>
<body>

<header>
  <h1>画像一括縮小 (比例維持)</h1>
</header>

<div class="app-body">
  <div id="file-panel">
    <div style="padding:10px; border-bottom:1px solid var(--border)">
      <button class="btn btn-outline" onclick="document.getElementById('file-input').click()">+ 画像を追加</button>
    </div>
    <div id="file-list"></div>
    <div style="padding:10px; border-top:1px solid var(--border)">
      <button class="btn btn-outline" id="zip-btn" disabled>一括 ZIP 保存</button>
    </div>
  </div>

  <div id="main-area">
    <div id="empty-msg">画像をドロップするか、追加してください</div>
    <img id="preview-img">
  </div>

  <div id="sidebar">
    <section>
      <div class="section-title">リサイズ設定</div>
      <div class="ctrl-group">
        <div class="val-row">
          <span class="val-label">縮小率</span>
          <span class="val-num" id="v-scale">50%</span>
        </div>
        <input type="range" id="r-scale" min="1" max="100" value="50">
        
        <div class="res-box" id="res-info">
          元サイズ: ---<br>
          縮小後: <span>---</span>
        </div>
      </div>
    </section>

    <section style="margin-top: auto;">
      <button class="btn btn-primary" id="dl-btn" disabled>選択中の画像を保存</button>
      <div style="height:8px"></div>
      <button class="btn btn-outline" onclick="location.reload()">リストをクリア</button>
    </section>
  </div>
</div>

<input type="file" id="file-input" multiple accept="image/*">

<script>
let files = [];
let activeIndex = -1;

const fileInput = document.getElementById('file-input');
const fileList = document.getElementById('file-list');
const previewImg = document.getElementById('preview-img');
const rScale = document.getElementById('r-scale');

fileInput.onchange = (e) => {
  Array.from(e.target.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        // ファイル名から拡張子を分離して _small を付けやすくする
        const lastDot = file.name.lastIndexOf('.');
        const baseName = lastDot !== -1 ? file.name.substring(0, lastDot) : file.name;
        const ext = lastDot !== -1 ? file.name.substring(lastDot) : '';
        
        files.push({
          originalName: file.name,
          newName: baseName + '_small' + ext, // ここで末尾に付与
          img: img,
          originalW: img.width,
          originalH: img.height,
          type: file.type
        });
        renderList();
        if (activeIndex === -1) select(0);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
};

function renderList() {
  fileList.innerHTML = '';
  files.forEach((f, i) => {
    const div = document.createElement('div');
    div.className = 'file-item' + (i === activeIndex ? ' active' : '');
    div.innerHTML = `
      <img class="file-thumb" src="${f.img.src}">
      <div class="file-info">
        <div class="file-name">${f.newName}</div>
        <div class="file-meta">${f.originalW}x${f.originalH} → 縮小後表示</div>
      </div>
    `;
    div.onclick = () => select(i);
    fileList.appendChild(div);
  });
  updateUI();
}

function select(index) {
  activeIndex = index;
  const f = files[activeIndex];
  document.getElementById('empty-msg').style.display = 'none';
  previewImg.style.display = 'block';
  previewImg.src = f.img.src;
  renderList();
  updateResolutionInfo();
}

function updateResolutionInfo() {
  if (activeIndex === -1) return;
  const f = files[activeIndex];
  const scale = rScale.value / 100;
  const newW = Math.round(f.originalW * scale);
  const newH = Math.round(f.originalH * scale);
  document.getElementById('v-scale').textContent = rScale.value + '%';
  document.getElementById('res-info').innerHTML = `
    元: ${f.originalW} x ${f.originalH} px<br>
    新: <span>${newW} x ${newH} px</span>
  `;
}

function processedCanvas(f) {
  const canvas = document.createElement('canvas');
  const scale = rScale.value / 100;
  canvas.width = Math.round(f.originalW * scale);
  canvas.height = Math.round(f.originalH * scale);
  canvas.getContext('2d').drawImage(f.img, 0, 0, canvas.width, canvas.height);
  return canvas;
}

// 個別保存
document.getElementById('dl-btn').onclick = () => {
  const f = files[activeIndex];
  const canvas = processedCanvas(f);
  const link = document.createElement('a');
  link.download = f.newName;
  link.href = canvas.toDataURL(f.type, 0.9);
  link.click();
};

// 一括保存
document.getElementById('zip-btn').onclick = async () => {
  const zip = new JSZip();
  for (const f of files) {
    const canvas = processedCanvas(f);
    const base64 = canvas.toDataURL(f.type, 0.9).split(',')[1];
    zip.file(f.newName, base64, {base64: true});
  }
  const content = await zip.generateAsync({type:"blob"});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(content);
  link.download = `images_resized_all.zip`;
  link.click();
};

rScale.oninput = updateResolutionInfo;
function updateUI() {
  const hasFiles = files.length > 0;
  document.getElementById('dl-btn').disabled = !hasFiles;
  document.getElementById('zip-btn').disabled = !hasFiles;
}
</script>
<footer style="border-top: 0.5px solid #e0e0e0; padding: 1.5rem 0 1rem; text-align: center;"> <p style="font-size: 15px; color: #888; margin: 0 0 4px;">「あったらいいのに」を、作ってる。</p> <p style="font-size: 12px; color: #aaa; margin: 0;">© 2026 野村晃一 All rights reserved.</p> </footer> 
</body>
</html>
